<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>InterieurWERK – Inhalte verwalten</title>
</head>
<body>
  <!-- Decap CMS – Login per E-Mail/Passwort über DecapBridge. Konfiguration in config.yml. -->
  <script src="https://unpkg.com/decap-cms@^3.8.3/dist/decap-cms.js"></script>

  <!-- Echte Live-Vorschau: rendert die echte Website und injiziert die Inhalte live -->
  <script>
  (function () {
    if (!window.CMS || typeof createClass === 'undefined' || typeof h === 'undefined') return;

    function resolveAsset(value, getAsset) {
      if (!value) return '';
      try {
        var a = getAsset(value);
        return a ? a.toString() : value;
      } catch (e) { return value; }
    }

    function buildContent(entry, getAsset) {
      var data = entry.get('data');
      function g(k) { var v = data.get(k); return (v === undefined || v === null) ? '' : v; }
      var gallery = [];
      var gl = data.get('gallery');
      if (gl && gl.toJS) {
        gl.toJS().forEach(function (it) {
          if (!it) return;
          gallery.push({ src: resolveAsset(it.src, getAsset), cat: it.cat || '' });
        });
      }
      return {
        hero_eyebrow: g('hero_eyebrow'),
        hero_sub: g('hero_sub'),
        hero_image: resolveAsset(g('hero_image'), getAsset),
        phone: g('phone'),
        email: g('email'),
        address: g('address'),
        hours_week: g('hours_week'),
        hours_sat: g('hours_sat'),
        contact_lead: g('contact_lead'),
        cta_sub: g('cta_sub'),
        about: g('about'),
        gallery: gallery
      };
    }

    var LivePreview = createClass({
      post: function () {
        if (!this.frame || !this.frame.contentWindow) return;
        try {
          this.frame.contentWindow.postMessage(
            { type: 'iw-content', data: buildContent(this.props.entry, this.props.getAsset) },
            '*'
          );
        } catch (e) {}
      },
      focusField: function (key) {
        var LABELS = {
          hero_eyebrow: 'Obertitel (Hero)', hero_sub: 'Unterzeile (Hero)', hero_image: 'Hauptbild',
          phone: 'Telefon', email: 'E-Mail', address: 'Adresse',
          hours_week: 'Öffnungszeiten Mo–Fr', hours_sat: 'Öffnungszeiten Samstag',
          contact_lead: 'Kontakt-Intro', cta_sub: 'Abschluss-Aufruf', about: 'Über uns (Fußzeile)',
          gallery: 'Galerie'
        };
        var want = (LABELS[key] || '').trim().toLowerCase();
        if (!want) return;
        var target = null, labels = document.querySelectorAll('label');
        for (var i = 0; i < labels.length; i++) {
          var tx = (labels[i].textContent || '').trim().toLowerCase();
          if (tx === want || tx.indexOf(want) === 0) { target = labels[i]; break; }
        }
        if (!target) return;
        var box = target.closest('div') || target.parentElement;
        if (!document.getElementById('iw-edit-style')) {
          var s = document.createElement('style'); s.id = 'iw-edit-style';
          s.textContent = '@keyframes iwflash{0%{box-shadow:0 0 0 0 rgba(15,77,66,0);}15%{box-shadow:0 0 0 3px rgba(111,224,198,.95);}100%{box-shadow:0 0 0 0 rgba(111,224,198,0);}}.iw-flash{animation:iwflash 1.7s ease-out;border-radius:6px;}';
          document.head.appendChild(s);
        }
        var hl = box || target;
        try { hl.scrollIntoView({ behavior: 'smooth', block: 'center' }); } catch (e) { hl.scrollIntoView(); }
        hl.classList.remove('iw-flash'); void hl.offsetWidth; hl.classList.add('iw-flash');
        var input = box ? box.querySelector('input,textarea,select,[contenteditable="true"]') : null;
        if (input) { setTimeout(function () { try { input.focus(); } catch (e) {} }, 350); }
      },
      componentDidMount: function () {
        var self = this;
        // mehrfach nachfeuern, bis der iframe geladen + Listener bereit ist
        this._timer = setInterval(function () { self.post(); }, 700);
        setTimeout(function () { clearInterval(self._timer); }, 6000);
        // Klick aus der Vorschau -> passendes Feld fokussieren
        this._onEdit = function (e) { if (e && e.data && e.data.type === 'iw-edit') self.focusField(e.data.key); };
        window.addEventListener('message', this._onEdit);
        this.post();
      },
      componentWillUnmount: function () {
        if (this._timer) clearInterval(this._timer);
        if (this._onEdit) window.removeEventListener('message', this._onEdit);
      },
      componentDidUpdate: function () { this.post(); },
      render: function () {
        var self = this;
        return h('iframe', {
          src: '/?cmspreview=1',
          ref: function (el) { self.frame = el; },
          onLoad: function () { self.post(); },
          style: {
            width: '100%',
            height: '100vh',
            border: '0',
            display: 'block',
            background: '#ffffff'
          }
        });
      }
    });

    // Datei-Collection: Decap sucht das Template unter dem Datei-Schlüssel ("startseite").
    CMS.registerPreviewTemplate('startseite', LivePreview);
    CMS.registerPreviewTemplate('inhalte', LivePreview);
  })();
  </script>
</body>
</html>
