# ===========================================================
#  Decap CMS – Konfiguration für InterieurWERK
#  Login: E-Mail / Passwort über DecapBridge (classic auth)
#  -> Kein GitHub-Konto und kein Token für den Kunden nötig.
# ===========================================================

# DecapBridge classic auth (E-Mail/Passwort-Login)
backend:
  name: git-gateway
  repo: mertimann/interieurwerk-website
  branch: main
  identity_url: https://auth.decapbridge.com/sites/e82c6bdb-c1be-4788-ac9f-3fcb57df1e8e
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: 'Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    update: 'Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    delete: 'Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    uploadMedia: 'Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    deleteMedia: 'Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge'
    openAuthoring: 'Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge'

# Logo + Link zurück zur Seite (optional)
logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://interieurwerk-viersen.netlify.app

# Hochgeladene Fotos landen als echte Dateien hier im Projekt:
media_folder: "uploads"
public_folder: "/uploads"

# Sprache des Editors
locale: de

collections:
  - name: inhalte
    label: "Website-Inhalte"
    delete: false
    files:
      - name: startseite
        label: "Inhalte der Website"
        file: "content.json"
        format: json
        fields:
          - { label: "Obertitel (Hero)", name: hero_eyebrow, widget: string }
          - { label: "Unterzeile (Hero)", name: hero_sub, widget: text }
          - { label: "Hauptbild", name: hero_image, widget: image }
          - { label: "Telefon", name: phone, widget: string }
          - { label: "E-Mail", name: email, widget: string }
          - { label: "Adresse", name: address, widget: string, hint: "Zeilenumbruch mit <br> trennen, z. B. Grefrather Straße 120<br>41749 Viersen" }
          - { label: "Öffnungszeiten Mo–Fr", name: hours_week, widget: string }
          - { label: "Öffnungszeiten Samstag", name: hours_sat, widget: string }
          - { label: "Kontakt-Intro", name: contact_lead, widget: text }
          - { label: "Abschluss-Aufruf", name: cta_sub, widget: text }
          - { label: "Über uns (Fußzeile)", name: about, widget: text }
          - label: "Galerie"
            name: gallery
            widget: list
            label_singular: "Foto"
            summary: "{{fields.cat}}"
            fields:
              - { label: "Foto", name: src, widget: image }
              - label: "Sparte"
                name: cat
                widget: select
                options: ["Fliesen", "Naturstein", "Parkett", "Bäder", "Showroom", "Sonstiges"]
